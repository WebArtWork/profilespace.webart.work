<section class="page">
	<div class="mx-auto max-w-[var(--container)] px-4 py-8 sm:px-6 sm:py-12">
		<div class="mx-auto max-w-md">
			<div class="mb-6 flex items-center gap-3">
				<a routerLink="/" class="back-btn" aria-label="Back">
					<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
						<path d="M19 12H5M12 19l-7-7 7-7"/>
					</svg>
				</a>
				<h1 class="text-xl font-semibold text-[var(--c-text-strong)]">Scan QR profile</h1>
			</div>

			<div class="card overflow-hidden">
				<!-- Camera viewport -->
				<div class="viewport">
					<video #video autoplay playsinline muted class="camera-feed"></video>
					<canvas #canvas class="hidden"></canvas>

					<!-- Scan frame overlay -->
					@if (state() === 'scanning') {
						<div class="scan-frame" aria-hidden="true">
							<span class="scan-frame__corner scan-frame__corner--tl"></span>
							<span class="scan-frame__corner scan-frame__corner--tr"></span>
							<span class="scan-frame__corner scan-frame__corner--bl"></span>
							<span class="scan-frame__corner scan-frame__corner--br"></span>
							<span class="scan-frame__line"></span>
						</div>
					}

					<!-- Requesting camera -->
					@if (state() === 'requesting') {
						<div class="overlay">
							<div class="spinner" aria-label="Opening camera…"></div>
							<p class="mt-4 text-sm text-[var(--c-text-muted)]">Requesting camera access…</p>
						</div>
					}

					<!-- Error -->
					@if (state() === 'error') {
						<div class="overlay overlay--error">
							<svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
								<circle cx="12" cy="12" r="10"/>
								<line x1="12" y1="8" x2="12" y2="12"/>
								<line x1="12" y1="16" x2="12.01" y2="16"/>
							</svg>
							<p class="mt-3 text-sm font-medium text-[var(--c-text-strong)]">{{ errorMsg() }}</p>
						</div>
					}
				</div>

				<div class="p-5 text-center text-sm text-[var(--c-text-muted)]">
					Point the camera at a profilespace QR code
				</div>
			</div>
		</div>
	</div>
</section>
