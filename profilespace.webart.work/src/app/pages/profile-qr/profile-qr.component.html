<section class="page">
	<div class="mx-auto max-w-[var(--container)] px-4 py-8 sm:px-6 sm:py-12">
		@if (hasProfile()) {
			<div class="grid gap-6 lg:grid-cols-[minmax(0,1fr)_minmax(0,1fr)]">
				<!-- QR Code -->
				<div class="card flex flex-col items-center gap-6 p-8">
					<p class="label">Scan to get profile JSON</p>

					@if (isBrowser) {
						<div class="qr-wrap">
							<qr-code [value]="profileJson()" [size]="240" errorCorrectionLevel="M" />
						</div>
					}

					<div class="flex flex-wrap justify-center gap-3">
						<a routerLink="/edit" class="btn btn--primary">Edit profile</a>
						<a routerLink="/scan" class="btn btn--secondary">Scan someone's QR</a>
						<button type="button" class="btn btn--secondary" (click)="copyJson()">
							Copy JSON
						</button>
						<button type="button" class="btn btn--ghost" (click)="clear()">
							Clear profile
						</button>
					</div>
				</div>

				<!-- JSON preview -->
				<div class="card p-6">
					<p class="label">Profile data</p>
					<pre class="json-preview">{{ displayJson() }}</pre>
				</div>
			</div>
		} @else {
			<!-- Empty state -->
			<div class="card flex flex-col items-center gap-6 p-12 text-center">
				<div class="empty-icon" aria-hidden="true">
					<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
						<rect x="3" y="3" width="7" height="7" rx="1"/>
						<rect x="14" y="3" width="7" height="7" rx="1"/>
						<rect x="3" y="14" width="7" height="7" rx="1"/>
						<path d="M14 14h1v1h-1z M18 14h1v1h-1z M14 18h1v1h-1z M18 18h1v1h-1z M16 16h1v1h-1z"/>
					</svg>
				</div>
				<div>
					<h1 class="text-2xl font-semibold text-[var(--c-text-strong)]">No profile yet</h1>
					<p class="mt-2 text-[var(--c-text)]">
						Fill in your profile and a QR code will appear here.
					</p>
				</div>
				<div class="flex flex-wrap justify-center gap-3">
					<a routerLink="/edit" class="btn btn--primary">Create profile</a>
					<a routerLink="/scan" class="btn btn--secondary">Scan someone's QR</a>
				</div>
			</div>
		}
	</div>
</section>
